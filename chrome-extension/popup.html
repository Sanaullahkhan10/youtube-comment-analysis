<!DOCTYPE html>
<html>

  <title>Comment Sentiment Analysis</title>
  <style>
    body {
      width: 380px;
      padding: 12px;
      font-family: Arial, sans-serif;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 8px;
    }
    h3 {
